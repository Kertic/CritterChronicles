name: Build WebGL and Upload to itch.io

on:
  workflow_call:
    inputs:
      itch-user:
        required: true
        type: string
      itch-game:
        required: true
        type: string
      itch-channel:
        required: false
        type: string
        default: html5
    secrets:
      UNITY_LICENSE:
        required: true
      UNITY_EMAIL:
        required: true
      UNITY_PASSWORD:
        required: true
      BUTLER_API_KEY:
        required: true

permissions:
  contents: read

jobs:
  build-webgl:
    runs-on: ubuntu-latest

    env:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-WebGL-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-WebGL-

      - name: Build Unity WebGL
        uses: game-ci/unity-builder@v4
        with:
          targetPlatform: WebGL

      - name: Download butler
        run: |
          curl -L -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip -d butler
          chmod +x butler/butler

      - name: Upload WebGL build to itch.io
        run: |
          ./butler/butler push "build/WebGL/WebGL" "${{ inputs.itch-user }}/${{ inputs.itch-game }}:${{ inputs.itch-channel }}"
